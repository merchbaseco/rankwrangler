<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="128" height="128" rx="24" fill="#00b3b3"/>
    
    <!-- Bar chart lines with gradient -->
    <defs>
        <linearGradient id="barGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" style="stop-color:#EBFFFFFF"/>
            <stop offset="100%" style="stop-color:#96FFFFFF"/>
        </linearGradient>
    </defs>
    
    <!-- Bars -->
    <path d="M24 96V64" stroke="url(#barGradient)" stroke-width="16" stroke-linecap="round"/>
    <path d="M52 96V48" stroke="url(#barGradient)" stroke-width="16" stroke-linecap="round"/>
    <path d="M80 96V32" stroke="url(#barGradient)" stroke-width="16" stroke-linecap="round"/>
    <path d="M108 96V56" stroke="url(#barGradient)" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Subtle glow effect -->
    <g filter="url(#glow)">
        <path d="M24 96V64" stroke="#EBFFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
        <path d="M52 96V48" stroke="#EBFFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
        <path d="M80 96V32" stroke="#EBFFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
        <path d="M108 96V56" stroke="#EBFFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    </g>
    
    <defs>
        <filter id="glow" x="-8" y="-8" width="144" height="144" filterUnits="userSpaceOnUse">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>
</svg> 