version: '3.8'

services:
  # Caddy proxy - routes /api/* requests to the server
  caddy:
    image: caddy:alpine
    container_name: rankwrangler-caddy
    restart: always
    ports:
      - "8090:80"  # External port 8090 for server-level proxy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    networks:
      - rankwrangler-internal
      - webserver  # Connect to external webserver network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: rankwrangler-postgres
    restart: always
    environment:
      POSTGRES_DB: rankwrangler
      POSTGRES_USER: rankwrangler
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD not set}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rankwrangler-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankwrangler -d rankwrangler"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # RankWrangler Server
  server:
    image: ghcr.io/merchbaseco/rankwrangler-server:${RANKWRANGLER_IMAGE_TAG:-latest}
    container_name: rankwrangler-server
    restart: always
    environment:
      # Server config
      - PORT=8080
      
      # SP-API credentials
      - SPAPI_REFRESH_TOKEN=${SPAPI_REFRESH_TOKEN}
      - SPAPI_CLIENT_ID=${SPAPI_CLIENT_ID}
      - SPAPI_APP_CLIENT_SECRET=${SPAPI_APP_CLIENT_SECRET}
      
      # License system
      - LICENSE_SECRET=${LICENSE_SECRET}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      
      # Database connection (points to postgres service)
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=rankwrangler
      - DATABASE_USER=rankwrangler
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?DATABASE_PASSWORD not set}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rankwrangler-internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(res=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Allow time for migrations to complete
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  rankwrangler-internal:
    driver: bridge
    internal: false  # Allow outbound connections for SP-API
  webserver:
    external: true  # Connect to existing webserver network for server-level nginx
