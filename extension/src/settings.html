<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RankWrangler Settings</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, #ff6b6b, #ffa8a8);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      color: #333;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #ff6b6b;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }

    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status.warning {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }

    .status.hidden {
      display: none;
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background-color: #ff6b6b;
      color: white;
    }

    .btn-primary:hover {
      background-color: #ff5252;
    }

    .btn-primary:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: #f8f9fa;
      color: #333;
      border: 1px solid #dee2e6;
    }

    .btn-secondary:hover {
      background-color: #e9ecef;
    }

    .license-info {
      background-color: #f8f9fa;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #ff6b6b;
    }

    .license-info h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #333;
    }

    .license-detail {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .license-detail:last-child {
      margin-bottom: 0;
    }

    .license-detail .label {
      color: #666;
    }

    .license-detail .value {
      color: #333;
      font-weight: 500;
    }

    .help-text {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🏆</div>
      <h1>RankWrangler Settings</h1>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="licenseInfo" class="license-info" style="display: none;">
      <h3>License Information</h3>
      <div class="license-detail">
        <span class="label">Email:</span>
        <span class="value" id="licenseEmail">-</span>
      </div>
      <div class="license-detail">
        <span class="label">Usage Today:</span>
        <span class="value" id="licenseUsage">-</span>
      </div>
      <div class="license-detail">
        <span class="label">Expires:</span>
        <span class="value" id="licenseExpires">-</span>
      </div>
    </div>

    <div class="form-group">
      <label for="licenseKey">License Key</label>
      <input type="text" id="licenseKey" placeholder="Enter your license key here">
      <div class="help-text">
        Your license key is required to access the RankWrangler API. Contact support if you need a license key.
      </div>
    </div>

    <div class="button-group">
      <button id="saveButton" class="btn-primary">Save License</button>
      <button id="validateButton" class="btn-secondary">Validate</button>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
