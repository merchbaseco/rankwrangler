version: '3.8'

services:
  caddy:
    image: caddy:alpine
    container_name: caddy-proxy
    restart: always
    ports:
      - "80:80"    # HTTP (redirects to HTTPS)
      - "443:443"  # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # SSL certificates stored here
      - caddy_config:/config   # Caddy configuration cache
    networks:
      - webserver  # Connect to existing network for stack communication
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      - CADDY_INGRESS_NETWORKS=webserver
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  webserver:
    external: true