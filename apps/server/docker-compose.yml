version: '3.8'

services:
  rankwrangler-server:
    build: .
    container_name: rankwrangler-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SPAPI_REFRESH_TOKEN=${SPAPI_REFRESH_TOKEN}
      - SPAPI_CLIENT_ID=${SPAPI_CLIENT_ID}
      - SPAPI_APP_CLIENT_SECRET=${SPAPI_APP_CLIENT_SECRET}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "http.get('http://localhost:8080/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rankwrangler-network

networks:
  rankwrangler-network:
    driver: bridge