services:
  postgres:
    image: postgres:15-alpine
    container_name: rankwrangler-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: rankwrangler
      POSTGRES_USER: rankwrangler
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rankwrangler
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankwrangler -d rankwrangler"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: rankwrangler-server:local
    container_name: rankwrangler-server
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: rankwrangler
      DATABASE_USER: rankwrangler
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SPAPI_REFRESH_TOKEN: ${SPAPI_REFRESH_TOKEN}
      SPAPI_CLIENT_ID: ${SPAPI_CLIENT_ID}
      SPAPI_APP_CLIENT_SECRET: ${SPAPI_APP_CLIENT_SECRET}
      LICENSE_SECRET: ${LICENSE_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rankwrangler
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(res=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:alpine
    container_name: rankwrangler-caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    networks:
      - rankwrangler
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  rankwrangler:
    driver: bridge
