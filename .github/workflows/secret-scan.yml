name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets
        run: |
          docker run --rm \
            -v "$PWD":/repo \
            zricethezav/gitleaks:v8.30.0 \
            detect \
            --source=/repo \
            --log-opts='--all' \
            --redact \
            --no-banner
