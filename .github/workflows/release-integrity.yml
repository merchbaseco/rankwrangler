name: Release Integrity

on:
    pull_request:
    push:
        branches:
            - main
        tags:
            - 'v*'
    workflow_dispatch:

jobs:
    release-integrity:
        name: Release Metadata + CLI Artifact
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.1.27'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Validate release metadata
              run: bun run release:check

            - name: Build CLI artifact
              run: bun run cli:build

            - name: Verify packed CLI artifact
              run: bun run release:check-cli-pack

    github-release:
        name: GitHub Release Notes
        if: startsWith(github.ref, 'refs/tags/v')
        needs: release-integrity
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build GitHub release notes from CHANGELOG
              run: node scripts/release/extract-release-notes-from-changelog.mjs --tag "${{ github.ref_name }}" --output .github-release-notes.md

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  body_path: .github-release-notes.md
                  tag_name: ${{ github.ref_name }}
