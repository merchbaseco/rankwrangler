name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: merchbaseco/rankwrangler-server

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ github.sha }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      DATABASE_PASSWORD: ${{ secrets.RANKWRANGLER_DATABASE_PASSWORD }}
      LICENSE_SECRET: ${{ secrets.RANKWRANGLER_LICENSE_SECRET }}
      SESSION_SECRET: ${{ secrets.RANKWRANGLER_SESSION_SECRET }}
      ADMIN_EMAIL: ${{ secrets.RANKWRANGLER_ADMIN_EMAIL }}
      ADMIN_PASSWORD_HASH: ${{ secrets.RANKWRANGLER_ADMIN_PASSWORD_HASH }}
      SPAPI_REFRESH_TOKEN: ${{ secrets.RANKWRANGLER_SPAPI_REFRESH_TOKEN }}
      SPAPI_CLIENT_ID: ${{ secrets.RANKWRANGLER_SPAPI_CLIENT_ID }}
      SPAPI_APP_CLIENT_SECRET: ${{ secrets.RANKWRANGLER_SPAPI_APP_CLIENT_SECRET }}
    steps:
      - name: Deploy RankWrangler stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          envs: IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,DATABASE_PASSWORD,LICENSE_SECRET,SESSION_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD_HASH,SPAPI_REFRESH_TOKEN,SPAPI_CLIENT_ID,SPAPI_APP_CLIENT_SECRET
          script: |
            set -euo pipefail
            REPO_DIR="${HOME}/merchbase-infra"
            mkdir -p "${HOME}/.ssh"
            chmod 700 "${HOME}/.ssh"
            touch "${HOME}/.ssh/known_hosts"
            chmod 600 "${HOME}/.ssh/known_hosts"
            if ! grep -q "github.com" "${HOME}/.ssh/known_hosts" 2>/dev/null; then
              ssh-keyscan -H github.com >> "${HOME}/.ssh/known_hosts"
            fi
            if [[ ! -d "${REPO_DIR}/.git" ]]; then
              git clone git@github.com:merchbaseco/infra.git "${REPO_DIR}"
            fi
            if ! git config --global --get safe.directory "${REPO_DIR}" >/dev/null 2>&1; then
              git config --global --add safe.directory "${REPO_DIR}"
            fi
            cd "${REPO_DIR}"
            git pull --ff-only
            cd stack/rankwrangler
            {
              printf 'RANKWRANGLER_IMAGE_TAG=%q\n' "${IMAGE_TAG}"
              printf 'DATABASE_PASSWORD=%q\n' "${DATABASE_PASSWORD}"
              printf 'LICENSE_SECRET=%q\n' "${LICENSE_SECRET}"
              printf 'SESSION_SECRET=%q\n' "${SESSION_SECRET}"
              printf 'ADMIN_EMAIL=%q\n' "${ADMIN_EMAIL}"
              printf 'ADMIN_PASSWORD_HASH=%q\n' "${ADMIN_PASSWORD_HASH}"
              printf 'SPAPI_REFRESH_TOKEN=%q\n' "${SPAPI_REFRESH_TOKEN}"
              printf 'SPAPI_CLIENT_ID=%q\n' "${SPAPI_CLIENT_ID}"
              printf 'SPAPI_APP_CLIENT_SECRET=%q\n' "${SPAPI_APP_CLIENT_SECRET}"
            } > .env
            chmod 600 .env
            if [[ -n "${GHCR_USERNAME:-}" && -n "${GHCR_TOKEN:-}" ]]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            fi
            export RANKWRANGLER_IMAGE_TAG="$IMAGE_TAG"
            ./deploy.sh
