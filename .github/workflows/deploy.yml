name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy
        working-directory: /Users/zknicker/srv/rankwrangler
        run: |
          # Pull latest code
          git pull --ff-only

          # Build and restart
          # NOTE: compose.yml lives in apps/server/, but the real .env is at repo root.
          # Without --project-directory, Docker Compose will look for .env in apps/server/
          # and substitute blanks (causing Postgres to fail).
          docker compose --project-directory . -f apps/server/compose.yml build
          docker compose --project-directory . -f apps/server/compose.yml up -d

          # Show status
          docker compose --project-directory . -f apps/server/compose.yml ps
