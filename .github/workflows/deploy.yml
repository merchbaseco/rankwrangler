name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: merchbaseco/rankwrangler-server

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ github.sha }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      DATABASE_PASSWORD: ${{ secrets.RANKWRANGLER_DATABASE_PASSWORD }}
      LICENSE_SECRET: ${{ secrets.RANKWRANGLER_LICENSE_SECRET }}
      SESSION_SECRET: ${{ secrets.RANKWRANGLER_SESSION_SECRET }}
      ADMIN_EMAIL: ${{ secrets.RANKWRANGLER_ADMIN_EMAIL }}
      ADMIN_PASSWORD_HASH: ${{ secrets.RANKWRANGLER_ADMIN_PASSWORD_HASH }}
      SPAPI_REFRESH_TOKEN: ${{ secrets.RANKWRANGLER_SPAPI_REFRESH_TOKEN }}
      SPAPI_CLIENT_ID: ${{ secrets.RANKWRANGLER_SPAPI_CLIENT_ID }}
      SPAPI_APP_CLIENT_SECRET: ${{ secrets.RANKWRANGLER_SPAPI_APP_CLIENT_SECRET }}
    steps:
      - name: Create stack env file
        uses: SpicyPizza/create-envfile@v2
        with:
          envkey_RANKWRANGLER_IMAGE_TAG: ${{ env.IMAGE_TAG }}
          envkey_DATABASE_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          envkey_LICENSE_SECRET: ${{ env.LICENSE_SECRET }}
          envkey_SESSION_SECRET: ${{ env.SESSION_SECRET }}
          envkey_ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          envkey_ADMIN_PASSWORD_HASH: ${{ env.ADMIN_PASSWORD_HASH }}
          envkey_SPAPI_REFRESH_TOKEN: ${{ env.SPAPI_REFRESH_TOKEN }}
          envkey_SPAPI_CLIENT_ID: ${{ env.SPAPI_CLIENT_ID }}
          envkey_SPAPI_APP_CLIENT_SECRET: ${{ env.SPAPI_APP_CLIENT_SECRET }}
          file_name: stack.env
          fail_on_empty: true

      - name: Remove previous stack env artifact
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script: rm -rf "${HOME}/stack.env"

      - name: Upload stack env file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          source: stack.env
          target: .
          overwrite: true

      - name: Deploy RankWrangler stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          envs: IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            REPO_DIR="${HOME}/merchbase-infra"
            mkdir -p "${HOME}/.ssh"
            chmod 700 "${HOME}/.ssh"
            touch "${HOME}/.ssh/known_hosts"
            chmod 600 "${HOME}/.ssh/known_hosts"
            if ! grep -q "github.com" "${HOME}/.ssh/known_hosts" 2>/dev/null; then
              ssh-keyscan -H github.com >> "${HOME}/.ssh/known_hosts"
            fi
            if [[ ! -d "${REPO_DIR}/.git" ]]; then
              git clone git@github.com:merchbaseco/infra.git "${REPO_DIR}"
            fi
            if ! git config --global --get safe.directory "${REPO_DIR}" >/dev/null 2>&1; then
              git config --global --add safe.directory "${REPO_DIR}"
            fi
            cd "${REPO_DIR}"
            git pull --ff-only
            cd stack/rankwrangler
            STACK_ENV_PATH="${HOME}/stack.env"
            if [[ -d "${STACK_ENV_PATH}" ]]; then
              STACK_ENV_FILE="${STACK_ENV_PATH}/stack.env"
            else
              STACK_ENV_FILE="${STACK_ENV_PATH}"
            fi
            mv "${STACK_ENV_FILE}" .env
            if [[ -d "${STACK_ENV_PATH}" ]]; then
              rm -rf "${STACK_ENV_PATH}"
            fi
            chmod 600 .env
            if [[ -n "${GHCR_USERNAME:-}" && -n "${GHCR_TOKEN:-}" ]]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            fi
            export RANKWRANGLER_IMAGE_TAG="$IMAGE_TAG"
            ./deploy.sh
