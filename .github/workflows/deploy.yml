name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: merchbaseco/rankwrangler-server

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ github.sha }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      DATABASE_PASSWORD: ${{ secrets.RANKWRANGLER_DATABASE_PASSWORD }}
      LICENSE_SECRET: ${{ secrets.RANKWRANGLER_LICENSE_SECRET }}
      SESSION_SECRET: ${{ secrets.RANKWRANGLER_SESSION_SECRET }}
      ADMIN_EMAIL: ${{ secrets.RANKWRANGLER_ADMIN_EMAIL }}
      ADMIN_PASSWORD_HASH: ${{ secrets.RANKWRANGLER_ADMIN_PASSWORD_HASH }}
      SPAPI_REFRESH_TOKEN: ${{ secrets.RANKWRANGLER_SPAPI_REFRESH_TOKEN }}
      SPAPI_CLIENT_ID: ${{ secrets.RANKWRANGLER_SPAPI_CLIENT_ID }}
      SPAPI_APP_CLIENT_SECRET: ${{ secrets.RANKWRANGLER_SPAPI_APP_CLIENT_SECRET }}
    steps:
      - name: Deploy RankWrangler stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          envs: IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,DATABASE_PASSWORD,LICENSE_SECRET,SESSION_SECRET,ADMIN_EMAIL,ADMIN_PASSWORD_HASH,SPAPI_REFRESH_TOKEN,SPAPI_CLIENT_ID,SPAPI_APP_CLIENT_SECRET
          script: |
            set -euo pipefail
            REPO_DIR="${HOME}/merchbase-infra"
            AUTH_HEADER=$(printf '%s:%s' "${GHCR_USERNAME}" "${GHCR_TOKEN}" | base64 | tr -d '\n')
            git config --global http.https://github.com/.extraheader "Authorization: Basic ${AUTH_HEADER}"
            if [[ ! -d "${REPO_DIR}/.git" ]]; then
              git clone https://github.com/merchbaseco/infra.git "${REPO_DIR}"
            fi
            if ! git config --global --get safe.directory "${REPO_DIR}" >/dev/null 2>&1; then
              git config --global --add safe.directory "${REPO_DIR}"
            fi
            cd "${REPO_DIR}"
            git pull --ff-only
            cd stack/rankwrangler
            {
              echo "RANKWRANGLER_IMAGE_TAG=${IMAGE_TAG}"
              echo "DATABASE_PASSWORD=${DATABASE_PASSWORD}"
              echo "LICENSE_SECRET=${LICENSE_SECRET}"
              echo "SESSION_SECRET=${SESSION_SECRET}"
              echo "ADMIN_EMAIL=${ADMIN_EMAIL}"
              echo "ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}"
              echo "SPAPI_REFRESH_TOKEN=${SPAPI_REFRESH_TOKEN}"
              echo "SPAPI_CLIENT_ID=${SPAPI_CLIENT_ID}"
              echo "SPAPI_APP_CLIENT_SECRET=${SPAPI_APP_CLIENT_SECRET}"
            } > .env
            chmod 600 .env
            if [[ -n "${GHCR_USERNAME:-}" && -n "${GHCR_TOKEN:-}" ]]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            fi
            export RANKWRANGLER_IMAGE_TAG="$IMAGE_TAG"
            ./deploy.sh
