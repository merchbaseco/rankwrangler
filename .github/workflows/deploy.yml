name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy
        working-directory: /Users/zknicker/srv/rankwrangler
        run: |
          # Pull latest code
          git pull --ff-only

          # Build and restart
          docker compose build
          docker compose up -d

          # Show status
          docker compose ps
